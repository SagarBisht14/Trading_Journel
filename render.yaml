services:
  - type: web
    name: trading-journel
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: UPLOAD_ROOT
        value: uploads
      - key: CLIENT_URL
        value: https://trading-journel-client.vercel.app
      - key: FRONTEND_URL
        value: https://trading-journel-client.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://trading-journel-client.vercel.app
      - key: ADMIN_SETUP_SECRET
        sync: false
